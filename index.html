<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workforce Analytics Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7f9;
    --surface: #ffffff;
    --surface2: #faf0f6;
    --border: #edd5e8;
    --border2: #d9a8ce;
    --magenta: #e2007a;
    --magenta2: #c4006b;
    --magenta3: #f0339a;
    --magenta-light: #fce8f3;
    --magenta-pale: #fdf3fa;
    --purple: #7b2d8b;
    --purple2: #6a2478;
    --purple3: #9b3ab0;
    --purple-light: #f2e8f6;
    --purple-pale: #f8f2fb;
    --text: #1a0a1e;
    --text2: #5c3a66;
    --text3: #a07aaa;
    --accent: var(--magenta);
    --accent-light: var(--magenta-light);
    --green: #1a7a4a;
    --green-bg: #e6f5ed;
    --yellow: #7a5200;
    --yellow-bg: #fef8e6;
    --orange: #c45000;
    --orange-bg: #fef2e6;
    --red: #c41a1a;
    --red-bg: #fef0f0;
    --blue: #1a4ec4;
    --blue-bg: #eef3fe;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(226,0,122,0.06), 0 1px 2px rgba(123,45,139,0.04);
    --shadow-md: 0 4px 16px rgba(226,0,122,0.10), 0 2px 6px rgba(123,45,139,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TOP NAV ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(135deg, #1a0a1e 0%, #3a0a4a 50%, #1a0a2e 100%);
    border-bottom: 3px solid var(--magenta);
    padding: 0 28px;
    display: flex; align-items: center; gap: 0;
    height: 56px;
    box-shadow: 0 3px 20px rgba(226,0,122,0.30);
  }
  .topbar-brand {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 18px;
    color: #ffffff;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-right: 36px;
    white-space: nowrap;
  }
  .topbar-brand span { color: var(--magenta3); }
  .nav-tabs { display: flex; gap: 2px; flex: 1; }
  .nav-tab {
    font-family: 'Barlow', sans-serif;
    font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,0.5);
    padding: 8px 15px;
    border-radius: 6px;
    cursor: pointer;
    border: none; background: none;
    transition: all 0.15s;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .nav-tab:hover { color: rgba(255,255,255,0.9); background: rgba(226,0,122,0.15); }
  .nav-tab.active {
    color: #ffffff;
    background: var(--magenta);
    box-shadow: 0 0 12px rgba(226,0,122,0.4);
  }
  .nav-tab .tab-dot {
    display: inline-block; width: 5px; height: 5px;
    border-radius: 50%; margin-right: 6px; vertical-align: middle;
    background: currentColor; opacity: 0.8;
  }
  .topbar-filters {
    display: flex; align-items: center; gap: 10px; margin-left: auto;
  }
  .filter-select {
    background: rgba(226,0,122,0.15); border: 1px solid rgba(226,0,122,0.35);
    color: #ffffff; padding: 6px 10px; border-radius: 6px;
    font-size: 12px; font-family: 'Barlow', sans-serif; font-weight: 500;
    cursor: pointer; outline: none; transition: all 0.15s;
  }
  .filter-select option { background: #2a0a38; color: #fff; }
  .filter-select:focus { border-color: var(--magenta3); background: rgba(226,0,122,0.22); }
  .compare-sep {
    color: rgba(255,255,255,0.4); font-size: 11px; font-weight:700; padding: 0 2px; user-select:none;
  }
  .week-select-a { border-color: rgba(226,0,122,0.6) !important; }
  .week-select-b { border-color: rgba(123,45,139,0.6) !important; }
  .compare-badge {
    background: linear-gradient(135deg,#e2007a,#7b2d8b); color:#fff;
    font-size:10px; font-weight:700; padding:3px 8px; border-radius:12px;
    letter-spacing:0.5px; white-space:nowrap;
  }
  .cmp-a { color: #e2007a !important; font-weight:700 !important; }
  .cmp-b { color: #7b2d8b !important; font-weight:700 !important; }
  .cmp-a-bg { background: rgba(226,0,122,0.08) !important; }
  .cmp-b-bg { background: rgba(123,45,139,0.08) !important; }
  .cmp-diff-pos { color: #c41a1a !important; font-weight:700; }
  .cmp-diff-neg { color: #1a7a4a !important; font-weight:700; }
  td.compare-diff { font-size:11px; font-family:'DM Mono',monospace; }

  /* ── LAYOUT ── */
  .page { display: none; padding: 24px 28px; max-width: 1600px; margin: 0 auto; }
  .page.active { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }

  /* ── KPI STRIP ── */
  .kpi-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 22px; }
  .kpi {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    position: relative; overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .kpi:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .kpi::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--kpi-color, var(--magenta));
  }
  .kpi::after {
    content: ''; position: absolute; bottom: 0; right: 0;
    width: 60px; height: 60px; border-radius: 50%;
    background: var(--kpi-color, var(--magenta));
    opacity: 0.04; transform: translate(20px, 20px);
  }
  .kpi-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .kpi-value { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; line-height: 1; color: var(--text); }
  .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 5px; font-weight: 500; }

  /* ── GRID ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .grid-13 { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; margin-bottom: 16px; }
  .grid-31 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px; }
  .span-2 { grid-column: span 2; }

  /* ── CARD ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow);
  }
  .card-header {
    padding: 14px 18px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(to right, var(--magenta-pale), var(--purple-pale));
  }
  .card-title {
    font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--purple); letter-spacing: 0.02em; text-transform: uppercase;
  }
  .card-badge {
    font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: 20px; font-family: 'DM Mono', monospace;
  }
  .card-body { padding: 16px 18px; }
  .chart-wrap { padding: 12px 16px 16px; position: relative; background: #fff; }

  /* ── TABLE ── */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .data-table th {
    text-align: left; padding: 9px 12px;
    font-size: 10px; font-weight: 700; color: var(--purple);
    text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 2px solid var(--border);
    position: sticky; top: 0;
    background: linear-gradient(to right, var(--magenta-pale), var(--purple-pale));
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  .data-table th:hover { color: var(--magenta); }
  .data-table td {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    color: var(--text2); vertical-align: middle;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--magenta-light); color: var(--text); }
  .table-scroll { max-height: 340px; overflow-y: auto; }
  .table-scroll::-webkit-scrollbar { width: 4px; }
  .table-scroll::-webkit-scrollbar-thumb { background: var(--magenta3); border-radius: 2px; opacity: 0.3; }

  /* ── BADGES ── */
  .badge {
    display: inline-block; padding: 2px 9px; border-radius: 4px;
    font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace;
    white-space: nowrap; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .badge-active    { background: var(--green-bg);   color: var(--green); }
  .badge-critical  { background: var(--red-bg);     color: var(--red); }
  .badge-below     { background: var(--yellow-bg);  color: var(--yellow); }
  .badge-sporadic  { background: var(--orange-bg);  color: var(--orange); }
  .badge-decline   { background: var(--purple-light); color: var(--purple); }
  .badge-solo      { background: var(--blue-bg);    color: var(--blue); }
  .badge-missed    { background: var(--red-bg);     color: var(--red); }
  .badge-ok        { background: var(--green-bg);   color: var(--green); }
  .badge-ot-crit   { background: var(--red-bg);     color: var(--red); }
  .badge-ot-high   { background: var(--orange-bg);  color: var(--orange); }
  .badge-ot-mod    { background: var(--yellow-bg);  color: var(--yellow); }
  .badge-ot-low    { background: var(--green-bg);   color: var(--green); }

  /* ── TREND ARROW ── */
  .trend { font-size: 11px; font-weight: 700; }
  .trend.up   { color: var(--red); }
  .trend.down { color: var(--green); }
  .trend.flat { color: var(--text3); }

  /* ── SEARCH ── */
  .search-wrap { position: relative; }
  .search-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 7px 12px 7px 30px;
    border-radius: 6px; font-size: 13px; font-family: 'Barlow', sans-serif;
    outline: none; transition: all 0.2s;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { border-color: var(--magenta); box-shadow: 0 0 0 3px rgba(226,0,122,0.10); }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 13px; pointer-events: none;
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-bar { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .progress-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); width: 36px; text-align: right; flex-shrink: 0; }

  /* ── COACH TAG ── */
  .coach-tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace;
    border: 1px solid; white-space: nowrap; text-transform: uppercase;
  }

  /* ── SECTION HEADER ── */
  .section-label {
    font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3);
    margin-bottom: 12px;
  }

  /* ── OT BAR ── */
  .ot-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .ot-row:last-child { border-bottom: none; }
  .ot-loc { font-size: 12px; font-weight: 600; width: 170px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text2); }
  .ot-bar-wrap { flex: 1; }
  .ot-hrs { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); width: 44px; text-align: right; flex-shrink: 0; }

  /* ── LUNCH STATS ── */
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .stat-row:last-child { border-bottom: none; }
  .stat-name { font-size: 12.5px; color: var(--text2); }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; color: var(--purple); }

  /* ── WEEK TOGGLE ── */
  .week-toggle { display: flex; gap: 4px; }
  .wk-btn {
    font-size: 10px; padding: 4px 10px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text3);
    cursor: pointer; font-family: 'DM Mono', monospace; font-weight: 600;
    transition: all 0.15s; text-transform: uppercase;
  }
  .wk-btn:hover { border-color: var(--magenta); color: var(--magenta); }
  .wk-btn.on { background: var(--magenta); border-color: var(--magenta); color: #ffffff; box-shadow: 0 2px 8px rgba(226,0,122,0.3); }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }

  /* ── DIVIDER ACCENT ── */
  .page-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  }
  .page-header-line {
    flex: 1; height: 2px;
    background: linear-gradient(to right, var(--magenta), var(--purple), transparent);
  }

  /* ── EXECUTIVE SUMMARY ── */
  .exec-hero {
    background: linear-gradient(135deg, rgba(226,0,122,0.12), rgba(123,45,139,0.08));
    border: 1px solid rgba(226,0,122,0.2); border-radius: 14px;
    padding: 32px 36px; margin-bottom: 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
  }
  .exec-hero-left { flex: 1; }
  .exec-hero-title { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--magenta); text-transform: uppercase; margin-bottom: 6px; }
  .exec-hero-hrs { font-size: 64px; font-weight: 800; color: var(--text); line-height: 1; font-family: 'Barlow Condensed', sans-serif; }
  .exec-hero-sub { font-size: 14px; color: var(--text2); margin-top: 8px; }
  .exec-hero-wow { font-size: 28px; font-weight: 800; padding: 12px 24px; border-radius: 10px; text-align: center; min-width: 140px; }
  .exec-scorecard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .exec-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 24px; position: relative; overflow: hidden;
  }
  .exec-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent-color, var(--magenta));
  }
  .exec-card-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
  .exec-card-value { font-size: 36px; font-weight: 800; color: var(--accent-color, var(--text)); font-family: 'Barlow Condensed', sans-serif; line-height: 1; }
  .exec-card-sub { font-size: 12px; color: var(--text3); margin-top: 6px; }
  .exec-card-flag { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 10px; display: inline-block; margin-top: 6px; }
  .exec-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .exec-alert-list { list-style: none; padding: 0; margin: 0; }
  .exec-alert-list li {
    padding: 10px 14px; border-radius: 8px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px; font-size: 13px;
  }
  .exec-alert-list li .alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .exec-alert-list li .alert-name { font-weight: 600; flex: 1; }
  .exec-alert-list li .alert-val { font-family: 'DM Mono', monospace; font-weight: 700; font-size: 12px; }

  /* ── WEEK OVER WEEK ── */
  .wow-bar-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .wow-loc-name { font-size: 11px; color: var(--text2); width: 160px; flex-shrink: 0; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wow-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .wow-bar-row { display: flex; align-items: center; gap: 6px; }
  .wow-bar-label { font-size: 10px; width: 26px; color: var(--text3); flex-shrink: 0; }
  .wow-bar { height: 14px; border-radius: 3px; min-width: 2px; transition: width 0.4s ease; }
  .wow-bar-val { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text2); width: 46px; flex-shrink: 0; }
  .wow-diff { font-size: 11px; font-weight: 700; font-family: 'DM Mono', monospace; width: 60px; flex-shrink: 0; }
  .wow-section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; margin: 20px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  @media (max-width: 900px) {
    .exec-scorecard { grid-template-columns: 1fr; }
    .exec-grid-2 { grid-template-columns: 1fr; }
    .exec-hero { flex-direction: column; }
  }

</head>
<body>

<!-- NAV -->
<nav class="topbar">
  <div class="topbar-brand">WORKFORCE<span>OPS</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('summary')"    ><span class="tab-dot"></span>Executive Summary</button>
    <button class="nav-tab"        onclick="showPage('wow')"        ><span class="tab-dot"></span>Week-over-Week</button>
    <button class="nav-tab"        onclick="showPage('overview')"   ><span class="tab-dot"></span>Overview</button>
    <button class="nav-tab"        onclick="showPage('locations')"  ><span class="tab-dot"></span>Locations</button>
    <button class="nav-tab"        onclick="showPage('employees')"  ><span class="tab-dot"></span>Employees</button>
    <button class="nav-tab"        onclick="showPage('lunch')"      ><span class="tab-dot"></span>Lunch Breaks</button>
    <button class="nav-tab"        onclick="showPage('overtime')"   ><span class="tab-dot"></span>Overtime</button>
    <button class="nav-tab"        onclick="showPage('sunday')"     ><span class="tab-dot"></span>Sunday Premium</button>
  </div>
  <div class="topbar-filters">
    <select class="filter-select" id="globalCoach" onchange="applyGlobalFilter()">
      <option value="">All Coaches</option>
    </select>
    <select class="filter-select week-select-a" id="weekA" onchange="applyGlobalFilter()">
      <option value="">All Weeks</option>
      <option value="wk1">Wk1: 3/2–3/8</option>
      <option value="wk2">Wk2: 3/9–3/15</option>
      <option value="wk3">Wk3: 3/16–3/22</option>
      <option value="wk4">Wk4: 3/23–3/29</option>
    </select>
    <span class="compare-sep" id="compareSep" style="display:none">vs</span>
    <select class="filter-select week-select-b" id="weekB" onchange="applyGlobalFilter()" style="display:none">
      <option value="">— pick week —</option>
      <option value="wk1">Wk1: 3/2–3/8</option>
      <option value="wk2">Wk2: 3/9–3/15</option>
      <option value="wk3">Wk3: 3/16–3/22</option>
      <option value="wk4">Wk4: 3/23–3/29</option>
    </select>
    <button class="filter-select" id="compareToggle" onclick="toggleCompareMode()"
      style="background:rgba(123,45,139,0.2);border-color:rgba(123,45,139,0.5);cursor:pointer">
      ⇄ Compare
    </button>
    <span class="compare-badge" id="compareBadge" style="display:none">COMPARE MODE</span>
  </div>
</nav>

<!-- ══════════════════════════════════ EXECUTIVE SUMMARY ══════════════════════════════════ -->
<div class="page active" id="page-summary">

  <!-- Hero -->
  <div class="exec-hero">
    <div class="exec-hero-left">
      <div class="exec-hero-title">4-Week Period · 3/2 – 3/29/2026</div>
      <div class="exec-hero-hrs" id="exec-total-hrs">—</div>
      <div class="exec-hero-sub" id="exec-hero-sub">Total hours worked · <span id="exec-loc-count">—</span> locations · <span id="exec-emp-count">—</span> employees</div>
    </div>
    <div class="exec-hero-wow" id="exec-wow-badge">—</div>
  </div>

  <!-- Scorecard -->
  <div class="exec-scorecard">
    <div class="exec-card" style="--accent-color:#e2007a">
      <div class="exec-card-label">Wk4 Hours</div>
      <div class="exec-card-value" id="exec-wk4-hrs">—</div>
      <div class="exec-card-sub">Week of 3/23–3/29</div>
    </div>
    <div class="exec-card" style="--accent-color:#c41a1a">
      <div class="exec-card-label">Overtime Hours (4 Wks)</div>
      <div class="exec-card-value" id="exec-ot-hrs">—</div>
      <div class="exec-card-sub" id="exec-ot-sub">—</div>
    </div>

const COACHES = ['AMBULAI SHEKU','CHERYL','JOEL MONTERO','MANNY','MIKE COBBS','MR. WATTS','ROSE PEREZ','TBD'];

const coachColor = c => COACH_COLORS[COACHES.indexOf(c)] || '#94a3b8';

function coachTag(coach) {
  const col = coachColor(coach);
  return `<span class="coach-tag" style="color:${col};border-color:${col}30;background:${col}12">${coach}</span>`;
}

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
let activeWeeks = {wk1:true,wk2:true,wk3:true,wk4:true};
let locSortCol='total', locSortDir=-1;
let empSortCol='avg', empSortDir=-1;

function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  // Match nav tabs by explicit id map
  const tabMap = {summary:'Executive',wow:'Week',overview:'Overview',locations:'Locations',employees:'Employees',lunch:'Lunch',overtime:'Overtime',sunday:'Sunday'};
  document.querySelectorAll('.nav-tab').forEach(t=>{
    if(t.textContent.trim().toLowerCase().startsWith((tabMap[id]||'').toLowerCase().slice(0,5))) t.classList.add('active');
  });
  if(id==='summary')    { renderExecSummary(); }
  if(id==='wow')        { renderWow(); }
  if(id==='overview')   initOverview();
  if(id==='locations')  { initLocFilters(); renderLocTable(); renderLocCompare(); }
  if(id==='employees')  { initEmpFilters(); renderEmpTable(); renderEmpKpis(); }
  if(id==='lunch')      { initLunchFilters(); renderLunchTable(); renderLunchCharts(); renderLunchKpis(); }
  if(id==='overtime')   { initOtFilters(); renderOtTable(); renderOtLocTable(); renderOtBar(); renderOtKpis(); }
  if(id==='sunday')     { initSunFilters(); renderSunKpis(); renderSunLocTable(); renderSunBar(); renderSunTable(); }
}

// ── COMPARE MODE ──────────────────────────────────────────────────────────────
let compareMode = false;

function toggleCompareMode() {
  compareMode = !compareMode;
  document.getElementById('compareSep').style.display   = compareMode ? '' : 'none';
  document.getElementById('weekB').style.display        = compareMode ? '' : 'none';
  document.getElementById('compareBadge').style.display = compareMode ? '' : 'none';
  document.getElementById('compareToggle').style.background =
    compareMode ? 'rgba(226,0,122,0.3)' : 'rgba(123,45,139,0.2)';
  if(!compareMode) document.getElementById('weekB').value = '';
  applyGlobalFilter();
}

function getWeeks() {
  const wA = document.getElementById('weekA')?.value || '';
  const wB = compareMode ? (document.getElementById('weekB')?.value || '') : '';
  return { wA, wB, comparing: compareMode && wA && wB };
}

function getWeekLabel(wk) {
  return {wk1:'Wk1: 3/2–3/8', wk2:'Wk2: 3/9–3/15', wk3:'Wk3: 3/16–3/22', wk4:'Wk4: 3/23–3/29'}[wk] || wk;
}

function applyGlobalFilter() {
  const page = document.querySelector('.page.active')?.id.replace('page-','');
  if(!page) return;
  // Re-render only — don't reinit (would reset dropdowns/state)
  if(page==='summary')   renderExecSummary();
  if(page==='wow')       renderWow();
  if(page==='overview')  { const locs=getFilteredLocations(); renderKpis(locs); renderLocBar(locs); renderTotalLine(locs); renderCoachDonut(locs); renderStatusPie(); renderOvOtList(); }
  if(page==='locations') { renderLocTable(); renderLocCompare(); }
  if(page==='employees') { renderEmpTable(); renderEmpKpis(); }
  if(page==='lunch')     { renderLunchTable(); renderLunchCharts(); renderLunchKpis(); }
  if(page==='overtime')  { renderOtTable(); renderOtLocTable(); renderOtBar(); renderOtKpis(); }
  if(page==='sunday')    { renderSunKpis(); renderSunLocTable(); renderSunBar(); renderSunTable(); }
}

function getFilteredLocations() {
  const coach = document.getElementById('globalCoach').value;
  const {wA} = getWeeks();
  let locs = RAW.locations.filter(l => (!coach || l.coach===coach));
  if(wA) locs = [...locs].sort((a,b) => b[wA]-a[wA]);
  return locs;
}

// ══════════════════════════════════════
// INIT COACH DROPDOWNS
// ══════════════════════════════════════
function populateCoachDropdown(id, includeAll=true) {
  const sel = document.getElementById(id); if(!sel) return;
  const cur = sel.value;
  sel.innerHTML = includeAll ? '<option value="">All Coaches</option>' : '';
  COACHES.forEach(c => { sel.innerHTML += `<option value="${c}">${c}</option>`; });
  sel.value = cur;
}

window.addEventListener('DOMContentLoaded', () => {
  // Populate all coach dropdowns
  populateCoachDropdown('globalCoach');
  populateCoachDropdown('locCoachFilter');
  populateCoachDropdown('empCoachFilter');
  populateCoachDropdown('lunchCoachFilter');
  populateCoachDropdown('otCoachFilter');
  // Start on executive summary
  setTimeout(()=>{ showPage('summary'); }, 50);
});

const charts = {};
function destroyChart(id) { if(charts[id]) { charts[id].destroy(); delete charts[id]; } }

const CHART_DEFAULTS = {
  color: '#5c3a66',
  plugins: { legend: { labels: { color:'#5c3a66', font:{family:'DM Mono',size:11}, boxWidth:10, padding:12 } } },
  scales: {
    x: { ticks:{ color:'#a07aaa', font:{family:'DM Mono',size:10} }, grid:{ color:'rgba(226,0,122,0.06)' }, border:{color:'#edd5e8'} },
    y: { ticks:{ color:'#a07aaa', font:{family:'DM Mono',size:10} }, grid:{ color:'rgba(226,0,122,0.06)' }, border:{color:'#edd5e8'} }
  }
};

// ══════════════════════════════════════
// OVERVIEW
// ══════════════════════════════════════
function initOverview() {
  const locs = getFilteredLocations();
  renderKpis(locs);
  renderLocBar(locs);
  renderCoachDonut(locs);
  renderStatusPie();
  renderTotalLine(locs);
  renderOvOtList();
}

function renderKpis(locs) {
  const totalHrs = locs.reduce((s,l)=>s+l.total,0);
  const wk1 = locs.reduce((s,l)=>s+l.wk1,0);
  const wk2 = locs.reduce((s,l)=>s+l.wk2,0);
  const wk3 = locs.reduce((s,l)=>s+l.wk3,0);
  const wk4 = locs.reduce((s,l)=>s+l.wk4,0);
  const wow = ((wk4-wk3)/Math.max(wk3,1)*100).toFixed(1);
  const totalOt = RAW.loc_ot.reduce((s,l)=>s+l.total_ot,0);
  const nonSoloMissed = RAW.missed_lunch.filter(m=>!m.x===1).length;
  const grouped = getGroupedEmployees();

  const kpis = [
    {label:'Total Hours (4 Wks)', val: totalHrs.toFixed(0), sub: `${locs.length} locations`, color: '#e2007a'},
    {label:'Wk4 Hours', val: wk4.toFixed(0), sub: `WoW: ${wow>0?'+':''}${wow}%`, color: wow>=0?'#c41a1a':'#1a7a4a'},
    {label:'Active Employees', val: grouped.filter(e=>e.st==='Active').length, sub: `of ${grouped.length} total`, color: '#1a7a4a'},
    {label:'Flagged Employees', val: grouped.filter(e=>e.st!=='Active').length, sub: 'need attention', color: '#7a5200'},
    {label:'OT Hours (4 Wks)', val: totalOt.toFixed(1), sub: `${RAW.emp_ot.length} instances`, color: '#c41a1a'},
    {label:'Missed Lunches', val: RAW.missed_lunch.length, sub: `${nonSoloMissed} non-solo`, color: '#7b2d8b'},
  ];
  document.getElementById('kpi-strip').innerHTML = kpis.map(k=>`
    <div class="kpi" style="--kpi-color:${k.color}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value" style="color:${k.color}">${k.val}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join('');
}

function renderLocBar(locs) {
  destroyChart('locBar');
  const {wA, wB, comparing} = getWeeks();
  const labels = locs.map(l=>l.location.replace(/^(MA|RI|TN|CT|AR)-/,''));
  const allDefs = [{k:'wk1',label:'Wk1 3/2',color:'#e2007a'},{k:'wk2',label:'Wk2 3/9',color:'#7b2d8b'},{k:'wk3',label:'Wk3 3/16',color:'#f0339a'},{k:'wk4',label:'Wk4 3/23',color:'#c4006b'}];
  let datasets = [];
  if(comparing) {
    datasets = [
      {label:`${getWeekLabel(wA)} (A)`, data:locs.map(l=>l[wA]), backgroundColor:'#e2007a99', borderColor:'#e2007a', borderWidth:1, borderRadius:2},
      {label:`${getWeekLabel(wB)} (B)`, data:locs.map(l=>l[wB]), backgroundColor:'#7b2d8b99', borderColor:'#7b2d8b', borderWidth:1, borderRadius:2},
    ];
  } else {
    const wkDefs = wA ? allDefs.filter(w=>w.k===wA) : allDefs;
    wkDefs.forEach(w=>{ if(wA || activeWeeks[w.k]) datasets.push({label:w.label, data:locs.map(l=>l[w.k]), backgroundColor:w.color+'99', borderColor:w.color, borderWidth:1, borderRadius:2}); });
  }
  const ctx = document.getElementById('chartLocBar').getContext('2d');
  charts['locBar'] = new Chart(ctx, { type:'bar', data:{ labels, datasets },
    options:{ ...CHART_DEFAULTS, responsive:true, maintainAspectRatio:false,
      plugins:{ ...CHART_DEFAULTS.plugins, tooltip:{ callbacks:{ label: ctx=>`${ctx.dataset.label}: ${ctx.raw.toFixed(1)}h` } } },

function initLocFilters() { populateCoachDropdown('locCoachFilter'); }

function renderLocTable() {
  const search = document.getElementById('locSearch')?.value.toLowerCase()||'';
  const coach  = document.getElementById('locCoachFilter')?.value||'';
  const gCoach = document.getElementById('globalCoach')?.value||'';
  const {wA, wB, comparing} = getWeeks();
  let data = RAW.locations.filter(l=>
    (!coach || l.coach===coach) && (!gCoach || l.coach===gCoach) &&
    (!search || l.location.toLowerCase().includes(search) || l.coach.toLowerCase().includes(search))
  );
  if(wA) data.sort((a,b)=>b[wA]-a[wA]);
  else data.sort((a,b)=>(a[locSortCol]<b[locSortCol]?-1:1)*locSortDir);

  const wkColors = {wk1:'#e2007a',wk2:'#7b2d8b',wk3:'#f0339a',wk4:'#c4006b'};
  const cell = (val, wk) => {
    const hiA = wA===wk, hiB = wB===wk;
    const style = hiA ? `font-weight:700;color:#e2007a;background:#e2007a11` : hiB ? `font-weight:700;color:#7b2d8b;background:#7b2d8b11` : '';
    return `<td style="font-family:'DM Mono',monospace;${style}">${val.toFixed(1)}</td>`;
  };

  document.getElementById('loc-tbody').innerHTML = data.map(l=>{
    const trend = l.wk4-l.wk1;
    const tClass = trend>5?'up':trend<-5?'down':'flat';
    const tLabel = trend>0?`▲ ${trend.toFixed(1)}`:`▼ ${Math.abs(trend).toFixed(1)}`;

    let extraCols = '';
    if(comparing && wA && wB) {
      const diff = l[wB]-l[wA];
      const pct  = l[wA]>0 ? (diff/l[wA]*100).toFixed(1) : '—';
      const cls  = diff>=0 ? 'cmp-diff-pos' : 'cmp-diff-neg';
      extraCols = `<td class="compare-diff ${cls}">${diff>=0?'▲':'▼'}${Math.abs(diff).toFixed(1)}h (${diff>=0?'+':''}${pct}%)</td>`;
    }

    const totalCell = comparing && wA && wB
      ? `<td style="font-family:'DM Mono',monospace">${l[wA].toFixed(1)} <span style="color:#888;font-size:10px">vs</span> ${l[wB].toFixed(1)}</td>`
      : `<td style="font-family:'DM Mono',monospace;color:var(--text)">${wA ? l[wA].toFixed(1) : l.total.toFixed(0)}</td>`;

    return `<tr>
      <td style="color:var(--text);font-weight:500">${l.location}</td>
      <td>${coachTag(l.coach)}</td>
      ${cell(l.wk1,'wk1')}${cell(l.wk2,'wk2')}${cell(l.wk3,'wk3')}${cell(l.wk4,'wk4')}
      <td><span class="trend ${tClass}">${tLabel}h</span></td>
      <td style="font-family:'DM Mono',monospace">${l.avg.toFixed(1)}</td>
      ${totalCell}${extraCols}
    </tr>`;
  }).join('');
}

function sortLocTable(col) { if(locSortCol===col) locSortDir*=-1; else{locSortCol=col;locSortDir=-1;} renderLocTable(); }

function renderLocCompare() {
  destroyChart('locCompare');
  const coach  = document.getElementById('globalCoach')?.value||'';
  const {wA, wB, comparing} = getWeeks();
  const data   = RAW.locations.filter(l=>!coach||l.coach===coach);
  const ctx    = document.getElementById('chartLocCompare').getContext('2d');
  const allWks = [{k:'wk1',label:'Wk1',color:'#e2007a'},{k:'wk2',label:'Wk2',color:'#7b2d8b'},{k:'wk3',label:'Wk3',color:'#f0339a'},{k:'wk4',label:'Wk4',color:'#c4006b'}];
  let wks;
  if(comparing)   wks = [{k:wA,label:`${getWeekLabel(wA)} (A)`,color:'#e2007a'},{k:wB,label:`${getWeekLabel(wB)} (B)`,color:'#7b2d8b'}];
  else if(wA)     wks = allWks.filter(w=>w.k===wA);
  else            wks = allWks;
  charts['locCompare'] = new Chart(ctx, { type:'bar',
    data:{ labels: data.map(l=>l.location.replace(/^(MA|RI|TN|CT|AR)-/,'')),
      datasets: wks.map(w=>({label:w.label, data:data.map(l=>l[w.k]),
        backgroundColor:w.color+'22', borderColor:w.color, borderWidth:1, borderRadius:2}))},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{...CHART_DEFAULTS.plugins},
      scales:{ x:{...CHART_DEFAULTS.scales.x, ticks:{...CHART_DEFAULTS.scales.x.ticks,maxRotation:45,font:{size:9}}}, y:{...CHART_DEFAULTS.scales.y} }
    }});
}

function statusBadge(s) {
  const m={'Active':'badge-active','Below Threshold':'badge-below','Critical':'badge-critical','Sporadic':'badge-sporadic','Sharp Decline':'badge-decline','Low Hours + Sporadic':'badge-sporadic'};
  return `<span class="badge ${m[s]||'badge-below'}">${s}</span>`;
}

function getGroupedEmployees() {
  return RAW.employees.map(e => ({
    ...e,
    full_name: e.n,
    coaches: new Set(e.c),
    locations: new Set(e.l),
    wk1: e.w1, wk2: e.w2, wk3: e.w3, wk4: e.w4,
    avg: e.a, weeks_active: e.wa, status: e.st,
    sun_wk1: e.sw1, sun_wk2: e.sw2, sun_wk3: e.sw3, sun_wk4: e.sw4,
    sun_total: e.st2, sun_premium: e.sp,
    location_list: e.l.join(', '),
    coach_list: e.c.join(', '),
    multi_loc: e.l.length > 1,
  }));
}

function renderEmpTable() {
  const search = document.getElementById('empSearch')?.value.toLowerCase()||'';
  const status = document.getElementById('empStatusFilter')?.value||'';
  const coach  = document.getElementById('empCoachFilter')?.value||'';
  const gCoach = document.getElementById('globalCoach')?.value||'';
  const {wA, wB, comparing} = getWeeks();

  let data = getGroupedEmployees().filter(e=>
    (!status || e.st===status) &&
    (!coach  || e.c.has(coach)) &&
    (!gCoach || e.c.has(gCoach)) &&
    (!search || e.n.toLowerCase().includes(search) ||
                e.location_list.toLowerCase().includes(search) ||
                e.coach_list.toLowerCase().includes(search))
  );

  if(wA) data.sort((a,b)=>b[wA]-a[wA]);
  else data.sort((a,b)=>{
    const va=typeof a[empSortCol]==='string'?a[empSortCol]:(a[empSortCol]??0);
    const vb=typeof b[empSortCol]==='string'?b[empSortCol]:(b[empSortCol]??0);
    return (va<vb?-1:va>vb?1:0)*empSortDir;
  });

  const cell = (val, wk) => {
    const hiA=wA===wk, hiB=wB===wk;
    const style=hiA?`font-weight:700;color:#e2007a;background:#e2007a11`:hiB?`font-weight:700;color:#7b2d8b;background:#7b2d8b11`:'';
    return `<td style="font-family:'DM Mono',monospace;${style}">${val.toFixed(1)}</td>`;
  };

  document.getElementById('emp-tbody').innerHTML = data.map(e=>{
    const trend = e.w4-e.w1;
    const tClass=trend>3?'up':trend<-3?'down':'flat';
    const tLabel=trend>=0?`▲ ${trend.toFixed(1)}`:`▼ ${Math.abs(trend).toFixed(1)}`;
    const avgColor=e.a>=30?'var(--green)':e.a>=20?'var(--purple)':e.a>=10?'var(--yellow)':'var(--red)';
    const locDisplay=e.multi_loc
      ?`<span title="${e.location_list}" style="cursor:default">${[...e.l][0].replace(/^(MA|RI|TN|CT|AR)-/,'')}<span class="badge badge-solo" style="margin-left:4px">+${e.l.size-1} more</span></span>`
      :`<span style="font-size:11px">${e.location_list}</span>`;
    const coachDisplay=[...e.c].map(c=>coachTag(c)).join(' ');

    let extraCols='';
    if(comparing && wA && wB) {
      const diff=e[wB]-e[wA];
      const pct=e[wA]>0?(diff/e[wA]*100).toFixed(1):'—';
      const cls=diff>=0?'cmp-diff-pos':'cmp-diff-neg';
      extraCols=`<td class="compare-diff ${cls}">${diff>=0?'▲':'▼'}${Math.abs(diff).toFixed(1)}h (${diff>=0?'+':''}${pct}%)</td>`;
    }

    return `<tr>
      <td style="color:var(--text);font-weight:600">${e.n}</td>
      <td>${locDisplay}</td>
      <td>${coachDisplay}</td>
      ${cell(e.w1,'wk1')}${cell(e.w2,'wk2')}${cell(e.w3,'wk3')}${cell(e.w4,'wk4')}
      <td><span class="trend ${tClass}">${tLabel}h</span></td>
      <td style="font-family:'DM Mono',monospace;color:${avgColor};font-weight:700">${e.a.toFixed(1)}</td>
      <td style="text-align:center;font-family:'DM Mono',monospace">${e.wa}/4</td>
      <td>${statusBadge(e.st)}</td>
      ${extraCols}
    </tr>`;
  }).join('')||`<tr><td colspan="11" class="empty">No employees match filters</td></tr>`;
}

function lunchStatus(row) {
  if(row.x===1) return '<span class="badge badge-solo">Solo / Exempt?</span>';
  if(row.g===0) return '<span class="badge badge-missed">No Break</span>';
  if(row.r===60 && row.g<30) return '<span class="badge badge-missed">Critical</span>';
  if(row.r===60 && row.g<50) return '<span class="badge badge-sporadic">Insufficient</span>';
  return '<span class="badge badge-below">Short Break</span>';
}

function otSeverityBadge(ot) {
  if(ot>=15) return '<span class="badge badge-ot-crit">Critical 15h+</span>';
  if(ot>=8)  return '<span class="badge badge-ot-high">High 8-15h</span>';
  if(ot>=4)  return '<span class="badge badge-ot-mod">Moderate 4-8h</span>';
  return '<span class="badge badge-ot-low">Low &lt;4h</span>';
}

function renderSunTable() {
  const search  = document.getElementById('sunSearch')?.value.toLowerCase()||'';
  const coach   = document.getElementById('sunCoachFilter')?.value||'';
  const gCoach  = document.getElementById('globalCoach')?.value||'';
  const rate    = parseFloat(document.getElementById('baseRate')?.value||15);
  const {wA, wB, comparing} = getWeeks();
  const sunKeyA = wA ? {wk1:'sw1',wk2:'sw2',wk3:'sw3',wk4:'sw4'}[wA] : null;
  const sunKeyB = wB ? {wk1:'sw1',wk2:'sw2',wk3:'sw3',wk4:'sw4'}[wB] : null;

  const data = RAW.employees.filter(e=>
    (sunKeyA ? e[sunKeyA]>0 : e.st2>0) &&
    (!coach  || e.c.includes(coach)) &&
    (!gCoach || e.c.includes(gCoach)) &&
    (!search || e.n.toLowerCase().includes(search) ||
                e.l.join(' ').toLowerCase().includes(search))
  ).sort((a,b)=> sunKeyA ? b[sunKeyA]-a[sunKeyA] : b.st2-a.st2);

  const scell = (val, k) => {
    const hiA = sunKeyA===k, hiB = sunKeyB===k;
    const style = hiA ? `font-weight:700;color:#e2007a;background:#e2007a11`
                : hiB ? `font-weight:700;color:#7b2d8b;background:#7b2d8b11`
                : val>0 ? `color:var(--magenta)` : `color:var(--text3)`;
    return `<td style="font-family:'DM Mono',monospace;${style}">${val.toFixed(2)}</td>`;
  };

  document.getElementById('sun-emp-tbody').innerHTML = data.map(e=>{
    const riLocs = e.l.filter(l=>l.startsWith('RI-'));
    const locDisplay = riLocs.length>1
      ? `${riLocs[0].replace('RI-','')} <span class="badge badge-solo">+${riLocs.length-1}</span>`
      : (riLocs[0]?.replace('RI-','')||e.l[0]);
    const sunHrs  = sunKeyA ? e[sunKeyA]  : e.st2;
    const premHrs = sunKeyA ? e[sunKeyA]*0.5 : e.sp;
    const premCost = (premHrs * rate).toFixed(2);

    let diffCol = '';
    if(comparing && sunKeyA && sunKeyB) {
      const diff = e[sunKeyB]-e[sunKeyA];
      const cls  = diff>=0 ? 'cmp-diff-pos' : 'cmp-diff-neg';
      diffCol = `<td class="compare-diff ${cls}">${diff>=0?'▲':'▼'}${Math.abs(diff).toFixed(2)}h</td>`;
    }

    return `<tr>
      <td style="color:var(--text);font-weight:600">${e.n}</td>
      <td style="font-size:11px">${locDisplay}</td>
      <td style="font-size:11px">${[...new Set(e.c)].join(', ')}</td>
      ${scell(e.sw1,'sw1')}${scell(e.sw2,'sw2')}${scell(e.sw3,'sw3')}${scell(e.sw4,'sw4')}
      <td style="font-family:'DM Mono',monospace;font-weight:700;color:var(--magenta)">${sunHrs.toFixed(2)}</td>
      <td style="font-family:'DM Mono',monospace;font-weight:700;color:var(--purple)">${premHrs.toFixed(2)}</td>
      <td style="font-family:'DM Mono',monospace;font-weight:700;color:var(--red)">$${Number(premCost).toLocaleString()}</td>
      ${diffCol}
    </tr>`;
  }).join('') || `<tr><td colspan="10" class="empty">No Sunday hours found</td></tr>`;
  renderSunKpis();
}

function renderExecSummary() {
  const coach = document.getElementById('globalCoach')?.value||'';
  const locs  = RAW.locations.filter(l=>!coach||l.coach===coach);
  const emps  = RAW.employees.filter(e=>!coach||e.c.includes(coach));

  const totalHrs = locs.reduce((s,l)=>s+l.total,0);
  const wk3      = locs.reduce((s,l)=>s+l.wk3,0);
  const wk4      = locs.reduce((s,l)=>s+l.wk4,0);
  const wow      = ((wk4-wk3)/Math.max(wk3,1)*100);
  const totalOt  = RAW.emp_ot.filter(e=>!coach||e.c.includes(coach)).reduce((s,e)=>s+e.o,0);
  const wk4Ot    = RAW.emp_ot.filter(e=>(!coach||e.c.includes(coach))&&e.w.includes('Wk4')).reduce((s,e)=>s+e.o,0);
  const nonSolo  = RAW.missed_lunch.filter(m=>m.x!==1&&(!coach||(Array.isArray(m.c)?m.c.includes(coach):m.c===coach))).length;
  const sunPrem  = RAW.loc_sun.reduce((s,l)=>s+l.total_premium,0)*15;
  const active   = emps.filter(e=>e.st==='Active').length;
  const flagged  = emps.filter(e=>e.st!=='Active').length;

  document.getElementById('exec-total-hrs').textContent = totalHrs.toLocaleString('en-US',{maximumFractionDigits:0});
  document.getElementById('exec-hero-sub').innerHTML    = `Total hours worked &nbsp;·&nbsp; ${locs.length} locations &nbsp;·&nbsp; ${emps.length} employees`;
  const wowBadge = document.getElementById('exec-wow-badge');
  wowBadge.textContent   = `${wow>=0?'+':''}${wow.toFixed(1)}%\nWoW`;
  wowBadge.style.cssText += `;background:${wow>=0?'rgba(196,0,27,0.12)':'rgba(26,122,74,0.12)'};color:${wow>=0?'#c41a1a':'#1a7a4a'};border:1px solid ${wow>=0?'rgba(196,0,27,0.3)':'rgba(26,122,74,0.3)'};white-space:pre;line-height:1.3`;

  document.getElementById('exec-wk4-hrs').textContent    = wk4.toLocaleString('en-US',{maximumFractionDigits:0});
  document.getElementById('exec-ot-hrs').textContent     = totalOt.toFixed(0)+'h';
  document.getElementById('exec-ot-sub').textContent     = `${wk4Ot.toFixed(1)}h this week (Wk4)`;
  document.getElementById('exec-lunch-val').textContent  = nonSolo.toLocaleString();
  document.getElementById('exec-active').textContent     = active;
  document.getElementById('exec-active-sub').textContent = `of ${emps.length} total employees`;
  document.getElementById('exec-flagged').textContent    = flagged;
  document.getElementById('exec-sun-cost').textContent   = '$'+sunPrem.toLocaleString('en-US',{maximumFractionDigits:0});

  // Locations alert — biggest WoW movers
  const locWow = locs.map(l=>({...l,diff:l.wk4-l.wk3,pct:(l.wk4-l.wk3)/Math.max(l.wk3,1)*100}))
    .filter(l=>Math.abs(l.diff)>3).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff)).slice(0,8);
  document.getElementById('exec-alert-locs').innerHTML = locWow.map(l=>{
    const bad=l.diff>0, color=bad?'#c41a1a':'#1a7a4a', bg=bad?'rgba(196,0,27,0.06)':'rgba(26,122,74,0.06)';
    return `<li style="background:${bg}">
      <span class="alert-dot" style="background:${color}"></span>
      <span class="alert-name">${l.location.replace(/^(MA|RI|TN|CT|AR)-/,'')}</span>
      <span style="font-size:11px">${coachTag(l.coach)}</span>
      <span class="alert-val" style="color:${color}">${bad?'▲':'▼'} ${Math.abs(l.diff).toFixed(1)}h (${bad?'+':''}${l.pct.toFixed(1)}%)</span>
    </li>`;
  }).join('')||'<li style="padding:12px;color:var(--text3);font-size:12px">No significant changes</li>';

  // Employees alert — flagged sorted by severity
  const statusRank={'Critical':0,'Sporadic':1,'Sharp Decline':2,'Below Threshold':3};
  const statusColors={'Critical':'#c41a1a','Sporadic':'#c45000','Sharp Decline':'#7b2d8b','Below Threshold':'#7a5200'};
  const flagEmps=emps.filter(e=>e.st!=='Active').sort((a,b)=>(statusRank[a.st]??9)-(statusRank[b.st]??9)).slice(0,8);
  document.getElementById('exec-alert-emps').innerHTML = flagEmps.map(e=>{
    const color=statusColors[e.st]||'#888';
    const loc=e.l.length>1?e.l[0].replace(/^(MA|RI|TN|CT|AR)-/,'')+` +${e.l.length-1}`:e.l[0].replace(/^(MA|RI|TN|CT|AR)-/,'');
    return `<li style="background:rgba(${e.st==='Critical'?'196,0,27':'123,45,139'},0.05)">
      <span class="alert-dot" style="background:${color}"></span>
      <span class="alert-name">${e.n}</span>
      <span style="font-size:11px;color:var(--text3)">${loc}</span>
      <span class="alert-val" style="color:${color}">${e.st} · ${e.a.toFixed(1)}h avg</span>
    </li>`;
  }).join('')||'<li style="padding:12px;color:var(--text3);font-size:12px">No flagged employees</li>';

  // Coach bar chart
  destroyChart('execCoach');
  const coaches=[...new Set(locs.map(l=>l.coach))].sort();
  const ctx=document.getElementById('chartExecCoach').getContext('2d');
  charts['execCoach']=new Chart(ctx,{type:'bar',
    data:{labels:coaches,datasets:[
      {label:'Wk3',data:coaches.map(c=>locs.filter(l=>l.coach===c).reduce((s,l)=>s+l.wk3,0)),backgroundColor:'#7b2d8b44',borderColor:'#7b2d8b',borderWidth:1,borderRadius:3},
      {label:'Wk4',data:coaches.map(c=>locs.filter(l=>l.coach===c).reduce((s,l)=>s+l.wk4,0)),backgroundColor:'#e2007a44',borderColor:'#e2007a',borderWidth:1,borderRadius:3},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{...CHART_DEFAULTS.plugins,tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.raw.toFixed(0)}h`}}},
      scales:{x:{...CHART_DEFAULTS.scales.x},y:{...CHART_DEFAULTS.scales.y}}}});
}

// ══════════════════════════════════════
// WEEK-OVER-WEEK
// ══════════════════════════════════════
function renderWow() {
  const coach=document.getElementById('globalCoach')?.value||'';
  const locs=RAW.locations.filter(l=>!coach||l.coach===coach);
  const maxHrs=Math.max(...locs.map(l=>Math.max(l.wk3,l.wk4)));
  const withDiff=locs.map(l=>({...l,diff:l.wk4-l.wk3,pct:(l.wk4-l.wk3)/Math.max(l.wk3,1)*100})).sort((a,b)=>b.diff-a.diff);
  const rising=withDiff.filter(l=>l.diff>0);
  const falling=[...withDiff.filter(l=>l.diff<=0)].reverse();

  function barBlock(l) {
    const w3pct=Math.min((l.wk3/maxHrs*100),100).toFixed(1);
    const w4pct=Math.min((l.wk4/maxHrs*100),100).toFixed(1);
    const bad=l.diff>0, color=bad?'#c41a1a':'#1a7a4a';
    return `<div class="wow-bar-wrap">
      <div class="wow-loc-name" title="${l.location}">${l.location.replace(/^(MA|RI|TN|CT|AR)-/,'')}</div>
      <div class="wow-bars">
        <div class="wow-bar-row">
          <div class="wow-bar-label" style="color:#7b2d8b">Wk3</div>
          <div class="wow-bar" style="width:${w3pct}%;background:#7b2d8b88"></div>
          <div class="wow-bar-val">${l.wk3.toFixed(0)}h</div>
        </div>
        <div class="wow-bar-row">
          <div class="wow-bar-label" style="color:#e2007a">Wk4</div>
          <div class="wow-bar" style="width:${w4pct}%;background:#e2007a88"></div>
          <div class="wow-bar-val">${l.wk4.toFixed(0)}h</div>
        </div>
      </div>
      <div class="wow-diff" style="color:${color}">${bad?'▲':'▼'} ${Math.abs(l.diff).toFixed(1)}h</div>
    </div>`;
  }

  document.getElementById('wow-rising-title').textContent  = `▲ Rising Hours — ${rising.length} locations`;
  document.getElementById('wow-falling-title').textContent = `▼ Falling Hours — ${falling.length} locations`;
  document.getElementById('wow-rising').innerHTML  = rising.map(barBlock).join('')||'<p style="color:var(--text3);font-size:12px;padding:12px 0">None</p>';
  document.getElementById('wow-falling').innerHTML = falling.map(barBlock).join('')||'<p style="color:var(--text3);font-size:12px;padding:12px 0">None</p>';

  destroyChart('wowChart');
  const sorted=[...withDiff].sort((a,b)=>b.diff-a.diff);
  const ctx=document.getElementById('chartWow').getContext('2d');
  charts['wowChart']=new Chart(ctx,{type:'bar',
    data:{labels:sorted.map(l=>l.location.replace(/^(MA|RI|TN|CT|AR)-/,'')),
      datasets:[
        {label:'Wk3',data:sorted.map(l=>l.wk3),backgroundColor:'#7b2d8b55',borderColor:'#7b2d8b',borderWidth:1,borderRadius:2},
        {label:'Wk4',data:sorted.map(l=>l.wk4),
          backgroundColor:sorted.map(l=>l.diff>0?'#c41a1a55':'#1a7a4a55'),
          borderColor:sorted.map(l=>l.diff>0?'#c41a1a':'#1a7a4a'),borderWidth:1,borderRadius:2},
      ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{...CHART_DEFAULTS.plugins,tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.raw.toFixed(1)}h`}}},
      scales:{x:{...CHART_DEFAULTS.scales.x,ticks:{...CHART_DEFAULTS.scales.x.ticks,maxRotation:45,font:{size:9}}},y:{...CHART_DEFAULTS.scales.y}}}});
}

// kick off
</script>
</body>
</html>
